
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
#container { width: 680px; height: 540px; position: relative; background: #1a1a2e; border-radius: var(--border-radius-lg); overflow: hidden; }
canvas { display: block; width: 100% !important; height: 100% !important; }
#info { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); font-size: 12px; color: rgba(255,255,255,0.45); pointer-events: none; white-space: nowrap; }
#wireframe-btn { position: absolute; top: 12px; right: 12px; font-size: 12px; color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.2); border-radius: 6px; padding: 5px 10px; cursor: pointer; }
#wireframe-btn:hover { background: rgba(255,255,255,0.18); }
</style>
<h2 class="sr-only">Interactive WebGL 3D vase model with orbit controls</h2>
<div id="container">
  <canvas id="c"></canvas>
  <div id="info">Left drag · rotate &nbsp;|&nbsp; Right drag / two-finger · pan &nbsp;|&nbsp; Scroll · zoom</div>
  <button id="wireframe-btn">Wireframe: Off</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const container = document.getElementById('container');
const canvas = document.getElementById('c');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setSize(680, 540);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, 680/540, 0.01, 1000);
camera.position.set(0, 3, 18);
camera.lookAt(0, 0, 0);

// Lighting
const ambient = new THREE.AmbientLight(0xffffff, 0.35);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
dirLight.position.set(5, 8, 10);
scene.add(dirLight);
const dirLight2 = new THREE.DirectionalLight(0x88ccff, 0.4);
dirLight2.position.set(-8, -4, -6);
scene.add(dirLight2);
const pointLight = new THREE.PointLight(0xaaddff, 0.5, 60);
pointLight.position.set(0, 4, 8);
scene.add(pointLight);

function f(x) {
  const b2 = 0.25*Math.pow(9.3-8.42511,2) + 1.97 + 9.3;
  if (x >= 0.0772 && x < 0.27) return -9.4*Math.pow(x-0.17,2) + 2.43;
  if (x >= 0.27 && x < 1) return ((0.16*Math.cos(1)-0.236)/0.73)*(x-0.27) + 2.336;
  if (x >= 1 && x < 7.6) return 0.16*Math.cos(x) + 2.1;
  if (x >= 7.6 && x < 9.3) return 0.25*Math.pow(x-8.42511,2) + 1.97;
  if (x >= 9.3 && x <= 9.875) return -x + b2;
  return 0;
}

const NX = 200, NS = 80;
const xmin = 0.0772, xmax = 9.875;
const midX = (xmin+xmax)/2;

// Build lathe geometry points
const points = [];
for (let i = 0; i <= NX; i++) {
  const x = xmin + (xmax-xmin)*i/NX;
  const r = f(x);
  points.push(new THREE.Vector2(r, x - midX));
}

const latheGeo = new THREE.LatheGeometry(points, NS);

// Cap the right end
const rEnd = f(xmax);
const capGeo = new THREE.CircleGeometry(rEnd, NS);
capGeo.rotateX(Math.PI/2);
capGeo.translate(0, xmax - midX, 0);

// Merge
const merged = new THREE.BufferGeometry();
const lathePos = latheGeo.attributes.position.array;
const capPos = capGeo.attributes.position.array;
const allPos = new Float32Array(lathePos.length + capPos.length);
allPos.set(lathePos); allPos.set(capPos, lathePos.length);

// Use both geometries as separate meshes for simplicity
const material = new THREE.MeshPhongMaterial({
  color: 0x88c8e8,
  specular: 0xffffff,
  shininess: 120,
  side: THREE.DoubleSide,
  transparent: true,
  opacity: 0.92,
});

const vaseMesh = new THREE.Mesh(latheGeo, material);
vaseMesh.rotation.z = Math.PI/2;
scene.add(vaseMesh);

const capMaterial = new THREE.MeshPhongMaterial({
  color: 0x88c8e8,
  specular: 0xffffff,
  shininess: 120,
  side: THREE.DoubleSide,
  transparent: true,
  opacity: 0.92,
});
const capMesh = new THREE.Mesh(capGeo, capMaterial);
capMesh.rotation.z = Math.PI/2;
scene.add(capMesh);

// Wireframe overlay
const wireGeo = new THREE.WireframeGeometry(latheGeo);
const wireMat = new THREE.LineBasicMaterial({ color: 0x4499cc, opacity: 0.25, transparent: true });
const wireMesh = new THREE.LineSegments(wireGeo, wireMat);
wireMesh.rotation.z = Math.PI/2;
wireMesh.visible = false;
scene.add(wireMesh);

// Grid
const grid = new THREE.GridHelper(30, 30, 0x333355, 0x222244);
grid.position.y = -3;
scene.add(grid);

// Wireframe toggle
let isWire = false;
document.getElementById('wireframe-btn').addEventListener('click', () => {
  isWire = !isWire;
  material.wireframe = isWire;
  capMaterial.wireframe = isWire;
  document.getElementById('wireframe-btn').textContent = `Wireframe: ${isWire ? 'On' : 'Off'}`;
});

// Orbit controls (manual implementation)
let isMouseDown = false;
let mouseButton = 0;
let lastX = 0, lastY = 0;
let spherical = { theta: -0.3, phi: 1.2, radius: 18 };
let target = new THREE.Vector3(0, 0, 0);
let panOffset = new THREE.Vector3();

function updateCamera() {
  const x = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  const y = spherical.radius * Math.cos(spherical.phi);
  const z = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.position.set(x + target.x, y + target.y, z + target.z);
  camera.lookAt(target);
}

container.addEventListener('mousedown', e => {
  isMouseDown = true;
  mouseButton = e.button;
  lastX = e.clientX; lastY = e.clientY;
  e.preventDefault();
});
window.addEventListener('mouseup', () => isMouseDown = false);
window.addEventListener('mousemove', e => {
  if (!isMouseDown) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  if (mouseButton === 0) {
    spherical.theta -= dx * 0.005;
    spherical.phi = Math.max(0.05, Math.min(Math.PI-0.05, spherical.phi + dy * 0.005));
  } else if (mouseButton === 2) {
    const panSpeed = 0.01 * spherical.radius;
    target.x -= dx * panSpeed;
    target.y += dy * panSpeed;
  }
  updateCamera();
});
container.addEventListener('contextmenu', e => e.preventDefault());
container.addEventListener('wheel', e => {
  spherical.radius = Math.max(2, Math.min(60, spherical.radius + e.deltaY * 0.02));
  updateCamera();
  e.preventDefault();
}, { passive: false });

// Touch
let touches = [];
container.addEventListener('touchstart', e => { touches = Array.from(e.touches); }, {passive:true});
container.addEventListener('touchmove', e => {
  if (e.touches.length === 1) {
    const dx = e.touches[0].clientX - touches[0].clientX;
    const dy = e.touches[0].clientY - touches[0].clientY;
    spherical.theta -= dx * 0.006;
    spherical.phi = Math.max(0.05, Math.min(Math.PI-0.05, spherical.phi + dy * 0.006));
  } else if (e.touches.length === 2) {
    const prev = Math.hypot(touches[0].clientX-touches[1].clientX, touches[0].clientY-touches[1].clientY);
    const curr = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    spherical.radius = Math.max(2, Math.min(60, spherical.radius - (curr-prev)*0.05));
  }
  touches = Array.from(e.touches);
  updateCamera();
}, {passive:true});

updateCamera();

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();
</script>
